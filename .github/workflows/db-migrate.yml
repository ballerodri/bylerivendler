name: Supabase DB migrate

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch: {}

concurrency:
  group: supabase-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      # One-time bootstrap: la migración inicial se corrió a mano vía SQL Editor.
      # Marcamos como aplicada para evitar que el CLI intente reaplicarla.
      # Idempotente (|| true): a partir de la segunda corrida es un no-op.
      - name: Bootstrap migration history
        run: supabase migration repair --status applied 20260504120000 || true

      - name: Push migrations
        run: supabase db push --include-all
